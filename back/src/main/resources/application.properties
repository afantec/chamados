spring.application.name=sustentacao-api

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/db_certezza
spring.datasource.username=sustentacao
spring.datasource.password=sustentacao
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# CORS
spring.web.cors.allowed-origins=http://localhost:3000

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Upload de arquivos de tarefas
app.upload.base-dir=C:/Sustentacao
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
